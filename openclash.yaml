  max-failed-times: 5
  type: url-test
  interval: 900
  tolerance: 20
  timeout: 5000
  lazy: false
  include-all: true
  filter: "(?i)(?:新加坡|Singapore|(?:^|[^A-Z])SG(?:$|[^A-Z]))"
  exclude-filter: "(?i)(?:PrxChain|ProxyChain|Proxy\\s*Chain|代理链|代理鏈|Line-|<|VPS-\\[|DIRECT|REJECT|PASS|官网|WiFi)"
  benchmark-url: https://www.apple.com/library/test/success.html
  benchmark-timeout: 5
  hidden: true

