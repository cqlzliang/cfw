---
mode: rule
mixed-port: 7890
allow-lan: false
ipv6: false
log-level: warning
external-controller: 127.0.0.1:9090
external-ui: "./UI"
external-ui-url: https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip
secret: ''
keep-alive-interval: 60
find-process-mode: strict
unified-delay: true
tcp-concurrent: false
geodata-mode: false
geodata-loader: memconservative
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/geoip.dat
  mmdb: https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country-without-asn.mmdb
  asn: https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/GeoLite2-ASN.mmdb
  geosite: https://cdn.jsdelivr.net/gh/v2fly/domain-list-community@release/dlc.dat
profile:
  tracing: true
  store-selected: true
  store-fake-ip: true
sniffer:
  enable: true
  override-destination: false
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - 443
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
  force-domain:
  - "+.v2ex.com"
  skip-domain:
  - Mijia Cloud
  - dlg.io.mi.com
  - "+.apple.com"
  - "+.icloud.com"
  - "+.wechat.com"
  - "+.qpic.cn"
  - "+.qq.com"
  - "+.wechatapp.com"
  - "+.vivox.com"
  - "+.oray.com"
  - "+.sunlogin.net"
ntp:
  enable: true
  write-to-system: false
  server: time.apple.com
  benchmark-url: https://www.apple.com/library/test/success.html
  benchmark-timeout: 5
  port: 123
tun:
  enable: true
  auto-detect-interface: true
  auto-route: true
  stack: system
  dns-hijack:
  - any:53
  - tcp://any:53
hosts:
  "+.clash.dev":
  - 127.0.0.1
  "+.stash.dev":
  - 127.0.0.1
dns:
  enable: true
  prefer-h3: false
  ipv6: false
  listen: 0.0.0.0:1053
  use-hosts: true
  use-system-hosts: true
  skip-cert-verify: false
  proxy-server-nameserver:
  - system
  default-nameserver:
  - system
  direct-nameserver:
  - https://dns.alidns.com/dns-query
  - https://dns.google/dns-query
  nameserver:
  - https://cloudflare-dns.com/dns-query
  - https://dns.google/dns-query
  respect-rules: true
  follow-rule: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  nameserver-policy:
    rule-set:GlobalDNS_Domain:
    - system
    rule-set:ChinaDNS_Domain:
    - system
    geosite:private:
    - system
    rule-set:Lan_Do_Resolve:
    - system
    "+.oca.nflxvideo.net":
    - "https://dns.alidns.com/dns-query#\U0001F39A.<Speedtest>"
    - "https://dns.google/dns-query#\U0001F39A.<Speedtest>"
    geosite:pornhub:
