rules:
  - RULE-SET,private,DIRECT
  - RULE-SET,REJECT,🚫广告拦截
  - RULE-SET,apple-cn,DIRECT
  - RULE-SET,bank-hk,DIRECT
  - RULE-SET,direct,DIRECT
  - RULE-SET,openai,🤖AI
  - RULE-SET,claude,🤖AI
  - RULE-SET,gemini,🤖AI
  - RULE-SET,grok,🤖AI
  - RULE-SET,ai-extra,🤖AI
  - RULE-SET,youtube,🎬YouTube
  - RULE-SET,telegram,💬社交媒体
  - RULE-SET,whatsapp,💬社交媒体
  - RULE-SET,twitter,💬社交媒体
  - RULE-SET,paypal,🇺🇸美国金融
  - RULE-SET,github,💻开发服务
  - RULE-SET,microsoft,Ⓜ️微软服务
  - RULE-SET,google,ⓖ谷歌服务
  - RULE-SET,apple,🍎Apple
  - RULE-SET,proxy,🔰国外流量
